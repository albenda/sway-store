<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sway · התשלום לא הושלם</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  body{font-family:'Assistant',system-ui,sans-serif;background:#f5f1ea;color:#16211f;
    min-height:100vh;display:grid;place-items:center;margin:0;text-align:center;padding:24px}
  .card{background:#fff;border-radius:18px;padding:48px 32px;max-width:460px;box-shadow:0 12px 32px -18px rgba(22,33,31,.2)}
  .mark{width:72px;height:72px;border-radius:50%;background:#ec5b3b;color:#fff;display:grid;place-items:center;
    font-size:2.2rem;margin:0 auto 18px}
  h1{font-size:1.8rem;margin:0 0 10px;letter-spacing:-.02em}
  p{color:#5b6a6b;font-size:1.1rem;line-height:1.6;margin:0 0 24px}
  a{display:inline-block;background:#ec5b3b;color:#fff;font-weight:700;text-decoration:none;
    padding:13px 28px;border-radius:12px}
  .logo{font-weight:800;font-size:1.4rem;margin-bottom:22px}
  .logo span{color:#1d6f66}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Sway<span>.</span></div>
    <div class="mark">!</div>
    <h1>התשלום לא הושלם</h1>
    <p>משהו נעצר באמצע. לא חויבת.<br>אפשר לנסות שוב, אנחנו כאן.</p>
    <a href="/#offer">נסו שוב</a>
  </div>
</body>
</html>
